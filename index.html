      max-width: 1100px;
      margin: 0 auto 24px;
      text-align: center;
    }

    h1 {

      width: 100%;
      padding: 12px 16px;
      border: 2px solid #eadfd2;
      border-radius: 12px;
      background: white;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;

    .search:focus { border-color: var(--primary); }

    .filters {
      max-width: 1100px;
      margin: 16px auto 32px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;

      border-radius: 999px;
      border: 2px solid #eadfd2;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      font-family: inherit;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--primary); }

    .filter-btn.active {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: white;
    }

    .sections {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #eadfd2;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .section-count {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      h1 { font-size: 1.5rem; }
      .section-title { font-size: 1.2rem; }
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px 12px 14px;
      text-align: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      border: none;
      font-family: inherit;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .card:hover, .card:focus-visible {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      outline: none;
    }

    .card .emoji {
      font-size: 2.5rem;
      display: block;
    }

    .card .word {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .tag {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      white-space: nowrap;
      margin-top: 2px;
      letter-spacing: 0.01em;

    .empty {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
    }

    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.2s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;

      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .close-btn:hover { background: #e8dfd2; }

    .modal-body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;

      width: 100%;
      height: auto;

      { word: "Jouer", emoji: "🧩", cat: "Activités & jeu", prio: "À venir", page: "jouer", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/jouer_v_1_1.mp4" },
      { word: "Chanter", emoji: "🎤", cat: "Activités & jeu", prio: "À venir", page: "chanter", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/chant_nm_2_1.mp4" },
      { word: "Musique", emoji: "🎵", cat: "Activités & jeu", prio: "À venir", page: "musique", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/musique_nf_1_1.mp4" },
      { word: "Histoire - Livre", emoji: "📖", cat: "Activités & jeu", prio: "À venir", page: "livre", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/28_livre_1__nf_1td001-encoded.mp4" },
      { word: "Écouter", emoji: "👂", cat: "Activités & jeu", prio: "Plus tard", page: "écouter", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/ecouter_v_1_1.mp4" },
      { word: "Ranger", emoji: "📦", cat: "Activités & jeu", prio: "Plus tard", page: "ranger", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/ranger.mp4" },
      { word: "Se cacher", emoji: "🙈", cat: "Activités & jeu", prio: "Plus tard", page: "cacher", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/cacher_v_1_1.mp4" },
      { word: "Partir", emoji: "🚶", cat: "Activités & jeu", prio: "Plus tard", page: "partir", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/partir_v_3_1.mp4" },
      { word: "Venir", emoji: "👉", cat: "Activités & jeu", prio: "Plus tard", page: "venir", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/venir_v_1_1.mp4" },
      { word: "Travailler", emoji: "💼", cat: "Activités & jeu", prio: "Plus tard", page: "travailler", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/travailler_v_3_1_6.mp4" },
      { word: "Se débrouiller", emoji: "💪", cat: "Activités & jeu", prio: "Plus tard", page: "débrouiller", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/debrouiller_v_2_6.mp4" },

      // Communication & politesse
      { word: "Oui", emoji: "✅", cat: "Communication & politesse", prio: "À venir", page: "oui", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/oui_adv_1_1.mp4" },
      { word: "Non", emoji: "❌", cat: "Communication & politesse", prio: "À venir", page: "non", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/non_adv_1_1.mp4" },
      { word: "Bonjour", emoji: "☀️", cat: "Communication & politesse", prio: "À venir", page: "bonjour", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/bonjour-3.mp4" },
      { word: "Merci", emoji: "🙏", cat: "Communication & politesse", prio: "À venir", page: "merci", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/merci_nf_1_1_6.mp4" },
      { word: "Bisous", emoji: "😘", cat: "Communication & politesse", prio: "À venir", page: "bisou", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/00242-2.mp4" },
      { word: "Au revoir", emoji: "👋", cat: "Communication & politesse", prio: "À venir", page: "revoir", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/revoir_v_1_2.mp4" },
      { word: "S'il te plaît", emoji: "🥺", cat: "Communication & politesse", prio: "Plus tard", page: "s'il te plaît", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/02252.mp4" },
      { word: "Pardon", emoji: "🙇", cat: "Communication & politesse", prio: "Plus tard", page: "pardon", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/pardon_nm_3_1.mp4" },

      // Consignes & sécurité
      { word: "Arrêter", emoji: "✋", cat: "Consignes & sécurité", prio: "À venir", page: "arrêter", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/41_arreter_1__v_1td001-encoded.mp4" },
      { word: "Interdit", emoji: "🚫", cat: "Consignes & sécurité", prio: "Plus tard", page: "interdit", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/interdit.mp4" },
      { word: "Important", emoji: "⚠️", cat: "Consignes & sécurité", prio: "Plus tard", page: "important", video: "https://elix-lsf.s3.rbx.io.cloud.ovh.net/spip_videos/important_adj_1_1.mp4" },
    ];

    // Normalise une chaîne pour la recherche : minuscules + retire les accents
    // (NFD décompose les caractères accentués, puis on supprime les diacritiques)
    const normalize = s => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");

    // Sort alphabétique global (les sections feront le regroupement)
    signs.sort((a, b) => a.word.localeCompare(b.word, "fr", { sensitivity: "base" }));
    // Pré-calcule la version normalisée du mot pour accélérer la recherche
    signs.forEach(s => { s.norm = normalize(s.word); });

    const sectionsEl = document.getElementById("sections");
    const filtersEl = document.getElementById("filters");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modal-title");
    const modalVideo = document.getElementById("modal-video");
    const modalLink = document.getElementById("modal-link");
    const closeBtn = document.getElementById("close-btn");
    const search = document.getElementById("search");

    let currentCat = "all";
    let currentSearch = "";

    function renderFilters() {
      filtersEl.innerHTML = "";
      const allCats = ["all", ...Object.keys(CATS)];
      allCats.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "filter-btn" + (c === currentCat ? " active" : "");
        btn.type = "button";
        btn.textContent = c === "all" ? "Tous" : c;
        if (c !== "all" && c === currentCat) {
          btn.style.background = CATS[c].color;
          btn.style.borderColor = CATS[c].color;
        }
        btn.addEventListener("click", () => {
          currentCat = c;
          renderFilters();
          renderSections();
        });
        filtersEl.appendChild(btn);
      });
    }

    let lastTrigger = null;

    function openModal(sign, triggerEl) {
      lastTrigger = triggerEl;
      modalTitle.innerHTML = `<span style="font-size:1.5rem">${sign.emoji}</span> ${sign.word}`;
      modalVideo.src = sign.video;
      modalLink.href = `https://dico.elix-lsf.fr/dictionnaire/${encodeURI(sign.page)}`;
      modal.classList.add("open");
      document.body.style.overflow = "hidden";
      // Focus le bouton fermer pour navigation clavier
      requestAnimationFrame(() => closeBtn.focus());
      modalVideo.play().catch(() => {});
    }

    function closeModal() {
      modal.classList.remove("open");
      modalVideo.pause();
      modalVideo.removeAttribute("src");
      modalVideo.load();
      document.body.style.overflow = "";
      // Rend le focus à la card d'origine pour la navigation clavier
      if (lastTrigger) { lastTrigger.focus(); lastTrigger = null; }
    }

    function makeCard(sign) {
      const card = document.createElement("button");
      card.className = "card";
      card.type = "button";
      const catCfg = CATS[sign.cat];
      const tagHtml = `<span class="tag" style="background:${catCfg.bg};color:${catCfg.color}">${sign.cat}</span>`;
      card.innerHTML = `
        <span class="emoji">${sign.emoji}</span>
        <span class="word">${sign.word}</span>
        ${tagHtml}
      `;
      card.setAttribute("aria-label", `Voir le signe : ${sign.word}, catégorie ${sign.cat}`);
      card.addEventListener("click", () => openModal(sign, card));
      return card;
    }

    function renderSections() {
      sectionsEl.innerHTML = "";
      const filtered = signs.filter(s => {
        const matchCat = currentCat === "all" || s.cat === currentCat;
        const matchSearch = !currentSearch || s.norm.includes(currentSearch);
        return matchCat && matchSearch;
      });

      PRIORITIES.forEach(prio => {
        const items = filtered.filter(s => s.prio === prio);
        if (items.length === 0) return;

        const section = document.createElement("section");
        section.className = "section";

        const header = document.createElement("div");
        header.className = "section-header";
        header.innerHTML = `
          <h2 class="section-title">${prio}</h2>
          <span class="section-count">${items.length} signe${items.length > 1 ? "s" : ""}</span>
        `;
        section.appendChild(header);

        const grid = document.createElement("div");
        grid.className = "grid";
        items.forEach(s => grid.appendChild(makeCard(s)));
        section.appendChild(grid);

        sectionsEl.appendChild(section);
      });

      if (sectionsEl.children.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "Aucun signe ne correspond à la recherche.";
        sectionsEl.appendChild(empty);
      }
    }

    renderFilters();
    renderSections();

    search.addEventListener("input", e => {
      currentSearch = normalize(e.target.value.trim());
      renderSections();
    });
    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
  </script>
</body>
</html>
